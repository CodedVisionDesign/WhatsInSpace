name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run spell check (British English)
        run: pnpm spell

      - name: Check for em dashes
        run: |
          if grep -rn '—' --include='*.ts' --include='*.tsx' --include='*.md' --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=out .; then
            echo "::error::Em dashes found in source files. Use hyphens (-) instead."
            exit 1
          fi

  build:
    name: Build Static Export
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Directory | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`out/\` (total) | $(du -sh out/ | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`out/\` (file count) | $(find out/ -type f | wc -l) files |" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-export
          path: out/
          retention-days: 1

  deploy:
    name: Deploy to Hostinger
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://whatsthatin.space
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: static-export
          path: out/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deployserver
            HostName ${{ secrets.HOSTINGER_SSH_HOST }}
            User ${{ secrets.HOSTINGER_SSH_USER }}
            Port ${{ secrets.HOSTINGER_SSH_PORT }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 60
            ServerAliveCountMax 3
          EOF

      - name: Deploy via rsync
        run: |
          DEPLOY_PATH="/home/u372385223/domains/whatsthatin.space/public_html"
          ssh deployserver "mkdir -p ${DEPLOY_PATH}"
          rsync -avz --delete --checksum --exclude='.releases' out/ deployserver:${DEPLOY_PATH}/
          echo "### Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|--|--|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${DEPLOY_PATH}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Verify deployment
        run: |
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "https://whatsthatin.space" || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "Health check passed: HTTP ${HTTP_CODE}"
          else
            echo "::warning::Health check returned HTTP ${HTTP_CODE} - site may still be propagating"
          fi

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/deploy_key

  lighthouse:
    name: Lighthouse Audit
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
